<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPEG vs JPEG2000 Projesi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Görüntü Sıkıştırma: JPEG vs JPEG2000</h1>
        
        <div class="controls">
            <!-- Dosya Seçimi -->
            <div class="control-group">
                <label>Resim Seçin:</label>
                <input type="file" id="imageInput" accept="image/png, image/jpeg">
            </div>

            <!-- Görüntü Kategorisi -->
            <div class="control-group">
                <label>Görüntü Kategorisi:</label>
                <select id="categorySelect">
                    <option value="natural">Doğal (Manzara, Portre)</option>
                    <option value="synthetic">Sentetik (Grafik, Logo)</option>
                    <option value="biomedical">Biyomedikal (X-Ray, MR)</option>
                </select>
            </div>

            <!-- Algoritma Seçimi -->
            <div class="control-group">
                <label>Algoritma:</label>
                <select id="algorithmSelect">
                    <option value="jpeg">JPEG (DCT Tabanlı - Blok Sıkıştırma)</option>
                    <option value="jpeg2000">JPEG 2000 (DWT Tabanlı - Dalgacık Sıkıştırma)</option>
                </select>
            </div>

            <!-- JPEG 2000'e Özel Parametreler -->
            <div id="jpeg2000Params" style="display: none; border-top: 1px solid #585b70; padding-top: 10px; margin-top: 10px;">
                <div class="control-group">
                    <label>Wavelet Filtresi:</label>
                    <select id="waveletSelect">
                        <option value="haar">Haar</option>
                        <option value="db1">Daubechies (db1)</option>
                        <option value="bior4.4">Biorthogonal (bior4.4)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Dekompozisyon Seviyesi:</label>
                    <input type="number" id="levelInput" min="1" max="5" value="2">
                </div>
            </div>
            
            <!-- Sıkıştırma Oranı Slider -->
            <div class="slider-container">
                <label for="ratioSlider">Sıkıştırma Oranı: <b>%<span id="ratioValue">50</span></b></label>
                <input type="range" id="ratioSlider" min="1" max="99" value="50">
                <div class="slider-labels">
                    <span>Az Sıkıştır (Net)</span>
                    <span>Çok Sıkıştır (Bozuk)</span>
                </div>
            </div>
            
            <button id="compressBtn">Sıkıştırmayı Başlat</button>
        </div>

        <!-- Sonuç Alanı -->
        <div class="results" id="resultsArea" style="display: none; flex-direction: column; align-items: center;">
            <div style="display: flex; width: 100%; gap: 20px; justify-content: center;">
                <div class="image-box">
                    <h3>Orijinal Resim</h3>
                    <img id="originalPreview" src="" alt="Orijinal">
                    <p id="originalStats" class="stats-text"></p>
                </div>
                <div class="image-box">
                    <h3>İşlenmiş Resim (<span id="resultAlgo"></span>)</h3>
                    <img id="compressedPreview" src="" alt="İşlenmiş">
                    <p id="compressedStats" class="stats-text"></p>
                    <!-- Metrik Alanları -->
                    <div class="metrics-container">
                        <div class="metric">MSE: <span id="mseVal">-</span></div>
                        <div class="metric">PSNR: <span id="psnrVal">-</span> dB</div>
                        <div class="metric">SSIM: <span id="ssimVal">-</span></div>
                    </div>
                </div>
            </div>

            <!-- Performans Analiz Grafiği (Yeni) -->
            <div class="plot-container" style="margin-top: 30px; text-align: center; width: 100%; border-top: 1px solid #585b70; padding-top: 20px;">
                <h3 style="color: #edf2f4; margin-bottom: 15px;">Performans Analiz Grafiği (PSNR vs Sıkıştırma)</h3>
                <img id="comparisonPlot" src="" style="max-width: 100%; border-radius: 10px; display: none; background-color: white; padding: 10px;">
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
